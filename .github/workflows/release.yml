name: Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $csproj = "src/DynamoCoreUpdate.csproj"
          $xml = [xml](Get-Content $csproj)
          $ver = $xml.Project.PropertyGroup[0].FileVersion   # e.g. 0.0.3.0
          $tag = 'v' + ($ver.Split('.')[0..2] -join '.')     # e.g. v0.0.3
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build
        shell: pwsh
        run: |
          dotnet publish src/DynamoCoreUpdate.csproj -c Release -p:PublishSingleFile=true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: src/dist/DynamoCoreUpdate.exe
          generate_release_notes: true
          body: |
            ## What's changed
            ${{ github.event.pull_request.title }}

            ${{ github.event.pull_request.body }}

            ---

            ## Usage

            > **Note:** intended for minor patch updates only (e.g. 3.6.x → 3.6.y). Not designed for jumping across major or minor versions.

            ### Quick start

            1. **Close Revit or Civil 3D** completely.
            2. Download `DynamoCoreUpdate.exe` below.
            3. Right-click and choose **Run as administrator**.
            4. Select your host application from the menu and follow the prompts.

            > First run will trigger a Windows SmartScreen prompt — click **More info → Run anyway**.

            ### Options

            ```
            DynamoCoreUpdate.exe [--host <key>] [--version <version>] [--install-dir <path>] [--zip-path <file>] [--build-dir <path>] [--backup-dir <path>] [--no-backup] [--force]
            ```

            | Flag | Description |
            |------|-------------|
            | `--host <key>` | Target host key (e.g. `revit-2026`, `civil3d-2026`). If omitted, an interactive menu is shown |
            | `--version <version>` | Runtime version to install (e.g. `3.6.2`). Use `latest` for the newest stable. If omitted, a picker is shown |
            | `--install-dir <path>` | Path to the Dynamo folder. Defaults to the standard install location |
            | `--zip-path <file>` | Use a locally downloaded zip instead of fetching from the build server |
            | `--build-dir <path>` | Use a local build directory instead of downloading |
            | `--backup-dir <path>` | Override the default backup location |
            | `--no-backup` | Skip the backup step |
            | `--force` | Re-install even if already on the target version |
